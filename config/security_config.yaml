# SAPladdin - Security Configuration
# ─────────────────────────────────────────────────────────────────────────────
# PERFIL: Administrador de sistemas senior con acceso total al sistema.
# allowed_directories vacío ([]) = acceso a todo el sistema de archivos.
# Ver README.md sección "Seguridad" para más detalles.
# ─────────────────────────────────────────────────────────────────────────────

security:
  # [] = acceso total al filesystem (igual que Desktop Commander en modo admin).
  # Añade rutas específicas aquí si quieres restringir en algún momento.
  allowed_directories: []

  # Solo bloqueamos lo irreversiblemente catastrófico.
  blocked_commands:
    - "format c:"
    - "format d:"
    - "format e:"
    - "diskpart"
    - "fdisk"
    - "mimikatz"
    - "shutdown /s"
    - "halt"
    - "poweroff"

  max_file_size_bytes: 104857600  # 100 MB
  max_read_lines: 5000

  write_blocked_extensions:
    - ".exe"
    - ".dll"
    - ".sys"

terminal:
  windows_shell: "powershell.exe"
  linux_shell:   "/bin/bash"
  macos_shell:   "/bin/zsh"
  default_timeout_seconds: 120
  max_output_chars: 1000000

logging:
  level: "INFO"
  log_to_file: false
  log_file: "logs/sapladdin.log"
