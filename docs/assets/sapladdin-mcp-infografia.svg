<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SAPladdin MCP para LLMs</title>
  <desc id="desc">Infografía de SAPladdin MCP: servidor MCP que conecta agentes LLM con sistemas SAP, herramientas, arquitectura, flujo de uso, configuración y casos de uso.</desc>
  <defs>
    <style>
      .bg{fill:#f7fbff}.card{fill:#fff;stroke:#cfe0f5;stroke-width:2}.head{fill:#0b2b5c;font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800}.blue{fill:#1268d8}.txt{fill:#16345f;font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px}.small{fill:#375172;font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px}.tiny{fill:#52667f;font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px}.chip{fill:#eef6ff;stroke:#bfd9f6}.icon{fill:#1268d8}.ok{fill:#15a05a}.line{stroke:#1268d8;stroke-width:4;stroke-linecap:round}.code{fill:#0b1930;font-family:Consolas,Monaco,monospace;font-size:14px}.muted{fill:#eaf3ff}.heart{fill:#e43142}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <rect x="18" y="18" width="86" height="86" rx="18" fill="#eaf3ff" stroke="#1268d8" stroke-width="4"/>
  <path d="M61 32 88 48v32L61 96 34 80V48z" fill="none" stroke="#1268d8" stroke-width="5"/><path d="M61 45 77 54v19l-16 9-16-9V54z" fill="none" stroke="#1268d8" stroke-width="4"/>
  <text x="128" y="62" class="head" font-size="54">SAPLADDIN <tspan class="blue">MCP</tspan></text>
  <text x="128" y="98" class="txt" font-size="24" font-weight="700">El MCP server que conecta tus LLMs con sistemas SAP</text>
  <g transform="translate(128,118)"><rect class="chip" width="190" height="30" rx="15"/><text x="18" y="21" class="small">Model Context Protocol</text><rect x="210" class="chip" width="164" height="30" rx="15"/><text x="228" y="21" class="small">Para agentes y LLMs</text><rect x="394" class="chip" width="188" height="30" rx="15"/><text x="412" y="21" class="small">Herramientas SAP reales</text><rect x="602" class="chip" width="140" height="30" rx="15"/><text x="620" y="21" class="small">Contexto seguro</text></g>

  <g transform="translate(930,18)"><rect class="card" width="190" height="108" rx="12"/><text x="24" y="36" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">GITHUB</text><text x="24" y="66" class="small">github.com/eduardoddddddd/SAPladdin</text><text x="24" y="92" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">PYTHON 3.11+</text></g>
  <g transform="translate(1135,18)"><rect class="card" width="205" height="108" rx="12"/><text x="18" y="28" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">¿QUÉ ES MCP?</text><text x="18" y="54" class="small">Un estándar abierto para que los</text><text x="18" y="73" class="small">LLMs conecten de forma segura a</text><text x="18" y="92" class="small">fuentes, herramientas y sistemas.</text></g>
  <g transform="translate(1355,18)"><rect class="card" width="225" height="108" rx="12"/><text x="38" y="28" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">LLM + SAPLADDIN MCP</text><circle cx="45" cy="66" r="25" fill="#eef6ff"/><text x="29" y="73" class="blue" font-size="25" font-weight="800" font-family="Arial">AI</text><path d="M82 66h42" class="line"/><path d="M118 58l10 8-10 8" fill="none" stroke="#1268d8" stroke-width="4"/><rect x="132" y="42" width="48" height="48" rx="10" fill="#eaf3ff" stroke="#1268d8" stroke-width="3"/><path d="M156 50 171 59v18l-15 9-15-9V59z" fill="none" stroke="#1268d8" stroke-width="3"/><path d="M188 66h25" class="line"/><text x="206" y="73" class="blue" font-size="22" font-weight="800" font-family="Arial">SAP</text></g>

  <g transform="translate(18,156)"><rect class="card" width="300" height="250" rx="12"/><text x="22" y="34" class="blue" font-size="22" font-weight="800" font-family="Inter,Segoe UI,Arial">¿PARA QUÉ SIRVE?</text><text x="22" y="68" class="small">SAPladdin expone tools MCP para que un LLM pueda:</text><circle class="ok" cx="30" cy="98" r="8"/><text x="48" y="104" class="small">Consultar información de sistemas SAP</text><circle class="ok" cx="30" cy="128" r="8"/><text x="48" y="134" class="small">Monitorizar procesos y jobs en tiempo real</text><circle class="ok" cx="30" cy="158" r="8"/><text x="48" y="164" class="small">Ejecutar transacciones y obtener resultados</text><circle class="ok" cx="30" cy="188" r="8"/><text x="48" y="194" class="small">Generar reportes y exportar datos</text><circle class="ok" cx="30" cy="218" r="8"/><text x="48" y="224" class="small">Administrar múltiples sistemas SAP</text></g>

  <g transform="translate(338,156)"><rect class="card" width="545" height="250" rx="12"/><text x="22" y="34" class="blue" font-size="22" font-weight="800" font-family="Inter,Segoe UI,Arial">HERRAMIENTAS MCP / TOOLS</text>
    <g transform="translate(18,58)"><rect class="muted" width="160" height="78" rx="10"/><text x="18" y="26" class="blue" font-size="16" font-weight="800" font-family="Inter,Segoe UI,Arial">system_info</text><text x="18" y="50" class="tiny">Versión, SID, kernel,</text><text x="18" y="66" class="tiny">instancia y hosts</text></g>
    <g transform="translate(192,58)"><rect class="muted" width="160" height="78" rx="10"/><text x="18" y="26" class="blue" font-size="16" font-weight="800" font-family="Inter,Segoe UI,Arial">process_monitor</text><text x="18" y="50" class="tiny">Procesos y work</text><text x="18" y="66" class="tiny">processes SAP</text></g>
    <g transform="translate(366,58)"><rect class="muted" width="160" height="78" rx="10"/><text x="18" y="26" class="blue" font-size="16" font-weight="800" font-family="Inter,Segoe UI,Arial">jobs</text><text x="18" y="50" class="tiny">Estado, logs y</text><text x="18" y="66" class="tiny">detalle de jobs</text></g>
    <g transform="translate(18,148)"><rect class="muted" width="160" height="78" rx="10"/><text x="18" y="26" class="blue" font-size="16" font-weight="800" font-family="Inter,Segoe UI,Arial">db_space</text><text x="18" y="50" class="tiny">Uso de tablespaces,</text><text x="18" y="66" class="tiny">capacidad y alertas</text></g>
    <g transform="translate(192,148)"><rect class="muted" width="160" height="78" rx="10"/><text x="18" y="26" class="blue" font-size="16" font-weight="800" font-family="Inter,Segoe UI,Arial">sap_transactions</text><text x="18" y="50" class="tiny">SE16 / SE37 y</text><text x="18" y="66" class="tiny">consultas SAP</text></g>
    <g transform="translate(366,148)"><rect class="muted" width="160" height="78" rx="10"/><text x="18" y="26" class="blue" font-size="16" font-weight="800" font-family="Inter,Segoe UI,Arial">export_data</text><text x="18" y="50" class="tiny">CSV, JSON, Excel,</text><text x="18" y="66" class="tiny">PDF y reportes</text></g>
  </g>

  <g transform="translate(898,156)"><rect class="card" width="300" height="250" rx="12"/><text x="20" y="34" class="blue" font-size="22" font-weight="800" font-family="Inter,Segoe UI,Arial">¿CÓMO LO USA UN LLM?</text><text x="24" y="68" class="small">1. El usuario pide una acción</text><text x="24" y="98" class="small">2. El LLM elige una tool MCP</text><text x="24" y="128" class="small">3. SAPladdin ejecuta en SAP</text><text x="24" y="158" class="small">4. Devuelve JSON estructurado</text><text x="24" y="188" class="small">5. El LLM responde en lenguaje natural</text></g>
  <g transform="translate(1215,156)"><rect class="card" width="365" height="250" rx="12"/><text x="24" y="34" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">EJEMPLO DE RESPUESTA JSON</text><rect x="24" y="54" width="315" height="150" rx="10" fill="#f8fbff" stroke="#bfd9f6"/><text x="44" y="82" class="code">{</text><text x="62" y="104" class="code">"tool": "system_info",</text><text x="62" y="126" class="code">"status": "success",</text><text x="62" y="148" class="code">"system_id": "PRD",</text><text x="62" y="170" class="code">"sap_version": "7.57 SP02",</text><text x="62" y="192" class="code">"status": "GREEN"</text><text x="44" y="214" class="code">}</text></g>

  <g transform="translate(18,425)"><rect class="card" width="355" height="215" rx="12"/><text x="22" y="34" class="blue" font-size="22" font-weight="800" font-family="Inter,Segoe UI,Arial">ARQUITECTURA MCP</text><rect x="28" y="70" width="85" height="94" rx="8" fill="#f8fbff" stroke="#bfd9f6"/><text x="40" y="98" class="small">LLM /</text><text x="40" y="117" class="small">AGENTE</text><text x="43" y="148" class="blue" font-size="23" font-weight="800" font-family="Arial">AI</text><path d="M126 117h46" class="line"/><rect x="185" y="70" width="85" height="94" rx="8" fill="#eaf3ff" stroke="#1268d8" stroke-width="3"/><text x="199" y="105" class="small">MCP</text><text x="197" y="126" class="small">SERVER</text><path d="M282 117h44" class="line"/><rect x="330" y="70" width="0" height="0"/><text x="300" y="105" class="blue" font-size="24" font-weight="800" font-family="Arial">SAP</text><text x="28" y="192" class="tiny">Seguro · Estandarizado · Extensible · Ligero · Rápido</text></g>

  <g transform="translate(393,425)"><rect class="card" width="270" height="215" rx="12"/><text x="18" y="32" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">PROMPTS QUE PUEDES USAR</text><text x="24" y="70" class="small">• Muéstrame los jobs fallidos de PRD</text><text x="24" y="100" class="small">• ¿Cuál es el uso de espacio en HANA?</text><text x="24" y="130" class="small">• Ejecuta SE16Z para /nva_saptans</text><text x="24" y="160" class="small">• Dame info del sistema PRD</text><text x="24" y="190" class="small">• Exporta usuarios SAP a Excel</text></g>

  <g transform="translate(683,425)"><rect class="card" width="520" height="215" rx="12"/><text x="20" y="32" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">CONFIGURACIÓN RÁPIDA</text><rect x="24" y="54" width="450" height="22" rx="5" fill="#0b1930"/><text x="34" y="70" class="code">git clone https://github.com/eduardoddddddd/SAPladdin.git</text><rect x="24" y="88" width="450" height="22" rx="5" fill="#0b1930"/><text x="34" y="104" class="code">pip install -r requirements.txt</text><rect x="24" y="122" width="450" height="22" rx="5" fill="#0b1930"/><text x="34" y="138" class="code">copy config/hosts.yaml.example config/hosts.yaml</text><rect x="24" y="156" width="450" height="22" rx="5" fill="#0b1930"/><text x="34" y="172" class="code">python -m sapladdin.mcp_server</text><text x="24" y="202" class="tiny">Clientes: Claude Desktop · Cursor · Continue · LibreChat · apps MCP compatibles</text></g>

  <g transform="translate(1222,425)"><rect class="card" width="358" height="215" rx="12"/><text x="20" y="32" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">CONFIG MCP CLIENTE</text><rect x="22" y="52" width="310" height="130" rx="10" fill="#f8fbff" stroke="#bfd9f6"/><text x="38" y="78" class="code">"mcpServers": {</text><text x="52" y="100" class="code">"SAPladdin": {</text><text x="66" y="122" class="code">"command": "python",</text><text x="66" y="144" class="code">"args": ["main.py"]</text><text x="52" y="166" class="code">}</text><text x="38" y="188" class="code">}</text></g>

  <g transform="translate(18,662)"><rect class="card" width="325" height="140" rx="12"/><text x="20" y="30" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">CASOS DE USO CON LLMs</text><text x="24" y="62" class="small">• Operaciones SAP en lenguaje natural</text><text x="24" y="88" class="small">• Soporte Basis L1/L2/L3</text><text x="24" y="114" class="small">• Reportes automáticos y alertas</text></g>
  <g transform="translate(362,662)"><rect class="card" width="325" height="140" rx="12"/><text x="20" y="30" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">CARACTERÍSTICAS</text><text x="24" y="62" class="small">• MCP nativo · seguro · modular</text><text x="24" y="88" class="small">• Multi-sistema y extensible</text><text x="24" y="114" class="small">• JSON estructurado optimizado para LLMs</text></g>
  <g transform="translate(706,662)"><rect class="card" width="280" height="140" rx="12"/><text x="20" y="30" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">TECNOLOGÍAS</text><text x="24" y="62" class="small">Python · MCP · SAP RFC/SSH</text><text x="24" y="88" class="small">PyYAML · asyncio · logging</text><text x="24" y="114" class="small">Clientes LLM compatibles con MCP</text></g>
  <g transform="translate(1005,662)"><rect class="card" width="250" height="140" rx="12"/><text x="20" y="30" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">BENEFICIOS</text><text x="24" y="62" class="small">Menos contexto perdido</text><text x="24" y="88" class="small">Datos reales en tiempo real</text><text x="24" y="114" class="small">Automatización confiable</text></g>
  <g transform="translate(1274,662)"><rect class="card" width="306" height="140" rx="12"/><text x="20" y="30" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">ENLACES ÚTILES</text><text x="24" y="62" class="small">README · docs/CLIENT_SETUP.md</text><text x="24" y="88" class="small">Issues · Discussions · Roadmap</text><text x="24" y="118" class="heart" font-size="28">♥</text><text x="62" y="114" class="blue" font-size="18" font-weight="800" font-family="Inter,Segoe UI,Arial">SAPladdin</text></g>

  <rect x="18" y="825" width="1562" height="55" rx="14" fill="#fff" stroke="#cfe0f5" stroke-width="2"/>
  <text x="42" y="860" class="blue" font-size="24" font-weight="900" font-family="Inter,Segoe UI,Arial">MCP POWERED</text><text x="215" y="860" class="txt" font-size="18">SAPladdin lleva el poder de SAP a tus LLMs: menos contexto perdido, datos reales y más acción.</text><text x="1320" y="862" class="blue" font-size="28" font-weight="900" font-family="Inter,Segoe UI,Arial">SAPLADDIN ♥</text>
</svg>
